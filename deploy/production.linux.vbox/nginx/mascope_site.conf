server {
  listen 80;
  listen [::]:80;

  root /var/www/mascope.site/production;

  index index.html;

  server_name mascope.com www.mascope.com;

  location / {
    try_files $uri $uri/ =404;
  }

#  return 301 https://$server_name$request_uri;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;

  include snippets/self-signed.conf;

  root /var/www/mascope.site/production;

  index index.html;

  server_name mascope.com www.mascope.com;

  location / {
    try_files $uri $uri/ =404;
  }
}


