proxy_cache_path /mascope_cache levels=1:2 keys_zone=mascope_cache:10m max_size=10g inactive=120m use_temp_path=off;

upstream upstream-api {
  server  127.0.0.1:MASCOPE_PUBLIC_API_PORT;
}

server {
  listen MASCOPE_PUBLIC_PORT;
  listen [::]:MASCOPE_PUBLIC_PORT;

  server_name mascope.com www.mascope.com;
  rewrite     ^(.*)   https://$host$1 permanent;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;


  include snippets/self-signed.conf;

  root /var/www/mascope.site/production;

  index index.html;
  server_name mascope.com www.mascope.com;

  gzip off;

  add_header 'Content-Security-Policy' 'upgrade-insecure-requests';
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  location / {
    proxy_cache mascope_cache;
    proxy_cache_revalidate on;
    proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
    proxy_cache_background_update on;
    proxy_cache_lock on;
    proxy_cache_bypass $cookie_nocache $arg_nocache;

    try_files $uri $uri/ =404;
  }

  location /socket.io/ {
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-NginX-Proxy true;
    proxy_pass http://upstream-api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;

    proxy_cache mascope_cache;
    proxy_cache_revalidate on;
    proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
    proxy_cache_background_update on;
    proxy_cache_lock on;
    proxy_cache_bypass $cookie_nocache $arg_nocache;
  }

}


