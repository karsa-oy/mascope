[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
; Exclude old tests
norecursedirs = tests/old
; Asyncio configuration:
; All async test functions must be explicitly marked with @pytest.mark.asyncio
asyncio_mode = strict 
; A single event loop is created for the entire test session. All async fixtures share this event loop.
asyncio_default_fixture_loop_scope = session 