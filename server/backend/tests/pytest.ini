[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
; Exclude old tests
norecursedirs = tests/old

; Asyncio configuration:

; strict: all async test functions must be explicitly marked with @pytest.mark.asyncio
asyncio_mode = strict
; session: a single event loop is created for the entire test session.
; Required because session-scoped async fixtures (engine, session factory) must share
; one event loop — asyncpg socket transports are bound to the loop they were created in
; and cannot be transferred to another loop.
asyncio_default_fixture_loop_scope = session
; session: test functions run in the same event loop as session-scoped fixtures.
; Required for asyncpg compatibility — if test functions used a separate function-scoped
; loop, any attempt to use a session-scoped engine connection from that loop would raise
; InterfaceError: cannot perform operation: another operation is in progress.
asyncio_default_test_loop_scope = session