# HTTP-only nginx config for LOCAL, single-machine use (localhost).
#
# Selected by the container entrypoint when MASCOPE_TLS=off. Loopback
# (http://localhost) is a browser "secure context", so clipboard and cookie auth
# work without TLS. Do NOT use this for network-reachable deployments -- serve
# those over HTTPS (the default nginx.conf). See docs/ADOPTION_PLAN.md.

proxy_cache_path /mascope_cache levels=1:2 keys_zone=mascope_cache:10m max_size=10g inactive=120m use_temp_path=off;

# declare backend dependency
upstream backend {
  ip_hash;  # sticky sessions for Socket.IO
  server backend:8090;
}

# serve the app over plain HTTP
server {
  server_name _;
  listen 80 default_server;
  listen [::]:80 default_server;

  # support standard content types
  include /etc/nginx/mime.types;

  # make the frontend the root directory
  root /app/frontend;
  index index.html;

  # Security headers. Same origin for frontend + API, so no CORS header is needed.
  # No Strict-Transport-Security here: this config serves plain HTTP for localhost,
  # where HSTS is both ignored and inappropriate.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  proxy_http_version 1.1;

  # upgrade socket
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_read_timeout 86400;

  # Forward the real client address so the backend can rate-limit per client.
  # Set at server level so the /api/ and /socket.io/ locations inherit them.
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # serve the frontend
  location / {
    proxy_cache mascope_cache;
    proxy_cache_revalidate on;
    proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
    proxy_cache_background_update on;
    proxy_cache_lock on;
    proxy_cache_bypass $cookie_nocache $arg_nocache;
    try_files $uri $uri/ =404;
  }

  # proxy the rest api
  location /api/ {
    proxy_pass http://backend;
  }

  # proxy the socket api
  location /socket.io/ {
    proxy_pass http://backend;
  }

  # special rules for file upload routes
  location /api/sample/files/upload {
    proxy_pass http://backend;
    # TODO_configuration: this should match with FILE_UPLOAD_SIZE_LIMIT
    client_max_body_size 2500M; # allows file uploads up to 2.5 gigabytes
  }
  location /api/sample/files/upload/tus {
    proxy_pass http://backend;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    # TODO_configuration: this should match with FILE_UPLOAD_SIZE_LIMIT
    client_max_body_size 2500M; # allows file uploads up to 2.5 gigabytes
  }
}
