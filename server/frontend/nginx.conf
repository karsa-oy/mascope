proxy_cache_path /mascope_cache levels=1:2 keys_zone=mascope_cache:10m max_size=10g inactive=120m use_temp_path=off;

# declare backend dependency
upstream backend {
  server backend:8090;
}

# redirect http to https
server {
  # define server metadata
  server_name mascope.app www.mascope.app;

  # http
  listen 80;
  listen [::]:80;

  rewrite ^/[old-page]$ https://[domain]/[new-page] permanent;
}

# serve the app in https
server {
  # define server metadata
  server_name mascope.app www.mascope.app;

  # https
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;

  # support standard content types
  include  /etc/nginx/mime.types;

  # declare certificate
  ssl_certificate /run/secrets/ssl_certificate;
  ssl_certificate_key /run/secrets/ssl_secret_key;

  # make the frontend the root directory
  root /app/frontend;
  index index.html;

  # enable cors
  add_header 'Access-Control-Allow-Origin' '*' always;
  proxy_http_version 1.1;

  # upgrade socket
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_read_timeout 86400;

  # serve the frontend
  location / {
    proxy_cache mascope_cache;
    proxy_cache_revalidate on;
    proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
    proxy_cache_background_update on;
    proxy_cache_lock on;
    proxy_cache_bypass $cookie_nocache $arg_nocache;
    try_files $uri $uri/ =404;
  }

  # proxy the rest api
  location /api/ {
    proxy_pass http://backend;
  }
  
  # proxy the socket api
  location /socket.io/ {
    proxy_pass http://backend;
  }

  # special rule for file upload route
  location /api/sample/files/upload/tus {
    proxy_pass http://backend;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    # TODO_configuration: this should match with FILE_UPLOAD_SIZE_LIMIT
    client_max_body_size 2500M; # allows file uploads up to 2.5 gigabytes
  }
}
