proxy_cache_path /mascope_cache levels=1:2 keys_zone=mascope_cache:10m max_size=10g inactive=120m use_temp_path=off;

# declare backend dependency
upstream backend {
  ip_hash;  # sticky sessions for Socket.IO
  server backend:8090;
}

# redirect http to https
server {
  # define server metadata
  server_name mascope.app www.mascope.app;

  # http
  listen 80;
  listen [::]:80;

  rewrite ^/[old-page]$ https://[domain]/[new-page] permanent;
}

# serve the app in https
server {
  # define server metadata
  server_name mascope.app www.mascope.app;

  # https
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;

  # support standard content types
  include  /etc/nginx/mime.types;

  # declare certificate
  ssl_certificate /run/secrets/ssl_certificate;
  ssl_certificate_key /run/secrets/ssl_secret_key;

  # make the frontend the root directory
  root /app/frontend;
  index index.html;

  # Security headers. The frontend and API share this origin in prod, so no CORS
  # Access-Control-Allow-Origin header is needed (and a wildcard would be unsafe
  # alongside credentialed cookie auth).
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  proxy_http_version 1.1;

  # Compress text responses. Match-record JSON for large batches is tens of
  # megabytes uncompressed and highly repetitive (~10x reduction).
  gzip on;
  gzip_types application/json application/javascript text/css;
  gzip_min_length 1024;
  gzip_comp_level 5;
  gzip_proxied any;
  gzip_vary on;

  # upgrade socket
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_read_timeout 86400;

  # Forward the real client address so the backend can rate-limit per client
  # (nginx overwrites these, so a client cannot spoof them). Set at server level
  # so the /api/ and /socket.io/ locations inherit them. The upload/tus location
  # sets its own proxy_set_header block and repeats these.
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # serve the frontend
  location / {
    proxy_cache mascope_cache;
    proxy_cache_revalidate on;
    proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
    proxy_cache_background_update on;
    proxy_cache_lock on;
    proxy_cache_bypass $cookie_nocache $arg_nocache;
    try_files $uri $uri/ =404;
  }

  # serve the bundled user documentation (static MkDocs site baked into the
  # image at /app/docs). A dedicated location so it wins over the SPA fallback
  # in `location /`; MkDocs emits relative URLs, so the same build works under
  # this prefix on any host.
  #
  # absolute_redirect off keeps the /docs and automatic trailing-slash
  # redirects relative, so they preserve the request's scheme/host/port. An
  # absolute redirect drops a non-standard port (breaks the :8080 demo stack).
  location = /docs {
    absolute_redirect off;
    return 301 /docs/;
  }
  location /docs/ {
    absolute_redirect off;
    alias /app/docs/;
    try_files $uri $uri/ $uri/index.html =404;
  }

  # proxy the rest api
  location /api/ {
    proxy_pass http://backend;
  }
  
  # proxy the socket api
  location /socket.io/ {
    proxy_pass http://backend;
  }

  # special rules for file upload routes
  location /api/sample/files/upload {
    proxy_pass http://backend;
    # TODO_configuration: this should match with FILE_UPLOAD_SIZE_LIMIT
    client_max_body_size 2500M; # allows file uploads up to 2.5 gigabytes
  }
  location /api/sample/files/upload/tus {
    proxy_pass http://backend;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # $http_host (not $host) so a non-standard port survives: the tus server
    # builds the upload Location URL from this header, and a dropped port sends
    # every chunk PATCH to port 80 (breaks uploads on e.g. the :8080 demo stack).
    proxy_set_header X-Forwarded-Host $http_host;
    # TODO_configuration: this should match with FILE_UPLOAD_SIZE_LIMIT
    client_max_body_size 2500M; # allows file uploads up to 2.5 gigabytes
  }
}
