# Weekly dependency update PRs. Actions are SHA-pinned in the workflows;
# Dependabot keeps the pins (and their version comments) fresh.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: /server/frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor-and-patch:
        update-types: ["minor", "patch"]
