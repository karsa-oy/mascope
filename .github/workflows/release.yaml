name: Mascope Release
run-name: ${{ github.actor }} is releasing Mascope

env:
  BRANCH: master

on:
  push:
    branches: [ master ]

jobs:

  # prep jobs

  release-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: write
    outputs:
      version: ${{ steps.make_version.outputs.version }}
    steps:
      # setup
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Create version tag
        id: make_version
        # Fixed 7-char hash (not %h, whose abbreviation length auto-scales with
        # clone depth) so CI and deploy clones always derive the same image tag.
        run: echo "version=$(git log -1 --date=format:"%Y.%m.%d" --format="%ad")-$(git rev-parse HEAD | cut -c1-7)" >> "$GITHUB_OUTPUT"
      - name: Push version tag
        id: tag_version
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: ${{ env.BRANCH }}
          custom_tag: ${{ steps.make_version.outputs.version }}

  docker-build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: release-tag
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          version: "0.11.2"
      - name: Build Docker images
        run: |
          export MASCOPE_PATH=/home/runner/work/mascope/mascope/

          # Build using the CLI. parse_version() derives the same VERSION on
          # master, so the compose `image: ...:${MASCOPE_VERSION}` builds and
          # tags the images as :$VERSION directly.
          uv run mascope prod build

      - name: Smoke test the built images
        env:
          MASCOPE_VERSION: ${{ needs.release-tag.outputs.version }}
        run: |
          # Release gate: boot the demo stack from the images built above and
          # verify boot, login and seeded API reads before anything is pushed
          # or tagged latest. Assert the tags exist locally first so compose
          # can't silently fall back to pulling an older release from GHCR.
          for service in backend frontend; do
            docker image inspect ghcr.io/${{ github.repository }}/$service:$MASCOPE_VERSION > /dev/null
          done
          docker compose -f docker-compose.demo.yaml up -d
          SMOKE_TIMEOUT=900 bash tooling/smoke-test.sh

      - name: Dump stack logs on failure
        if: failure()
        run: docker compose -f docker-compose.demo.yaml logs --tail 200

      - name: Push Docker images
        run: |
          VERSION=${{ needs.release-tag.outputs.version }}

          for service in backend frontend; do
            # alias image name
            IMAGE=ghcr.io/${{ github.repository }}/$service

            # also tag the build as :latest (rolling)
            docker tag $IMAGE:$VERSION $IMAGE:latest

            # push to the github container registry
            docker push --all-tags $IMAGE
          done
