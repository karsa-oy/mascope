name: Build release images

# When a GitHub Release is published, build the images from the tagged commit
# and push them as ghcr.io/karsa-oy/mascope/<service>:vX.Y.Z.
#
# It REBUILDS (rather than re-tagging a build image) so the release version
# bakes into the images: on a tag checkout parse_version() resolves to the tag,
# so the compose `image: ...:${MASCOPE_VERSION}` both tags the images :vX.Y.Z and
# bakes vX.Y.Z in as the displayed version. A pinned deploy (MASCOPE_VERSION=
# vX.Y.Z) then reports vX.Y.Z in the UI. `latest` is left untouched (it tracks
# master).
#
# NOTE: `release` events run the workflow from the repository's DEFAULT branch,
# so this file must be present there to take effect.

on:
  release:
    types: [published]

jobs:
  build-images:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out the release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: "0.11.2"

      - name: Build the release images
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          export MASCOPE_PATH="$GITHUB_WORKSPACE"

          # Pin the build to the release tag. The CLI uses setdefault, so this
          # wins: the compose `image: ...:${MASCOPE_VERSION}` tags the images
          # :$TAG and bakes $TAG in as the displayed version.
          export MASCOPE_VERSION="$TAG"
          echo "Building release images for $TAG"

          uv run mascope prod build

      - name: Smoke test the built images
        env:
          MASCOPE_VERSION: ${{ github.event.release.tag_name }}
        run: |
          # Same gate as the master release pipeline: the rebuild from the tag
          # is not guaranteed byte-identical to the master build that was
          # smoke-tested (base images are not digest-pinned), so verify boot,
          # login and seeded API reads before anything is pushed.
          for service in backend frontend; do
            docker image inspect ghcr.io/${{ github.repository }}/$service:$MASCOPE_VERSION > /dev/null
          done
          docker compose -f docker-compose.demo.yaml up -d
          SMOKE_TIMEOUT=900 bash tooling/smoke-test.sh

      - name: Dump stack logs on failure
        if: failure()
        run: docker compose -f docker-compose.demo.yaml logs --tail 200

      - name: Push the release images
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          for service in backend frontend; do
            docker push "ghcr.io/${{ github.repository }}/$service:$TAG"
            echo "Pushed ghcr.io/${{ github.repository }}/$service:$TAG"
          done
