name: Publish packages to PyPI

# Publishes mascope-sdk, mascope-tools and mascope-runtime when their
# pyproject version changes on master: bump the version in a PR, merge, and
# this workflow uploads the new release. Idempotent — a version that already
# exists on PyPI is skipped, so re-runs and unrelated pushes are safe.
#
# Auth is PyPI Trusted Publishing (OIDC), no tokens: each PyPI project must
# have a trusted publisher configured for this repository, this workflow file
# name, and the `pypi` environment (pypi.org -> project -> Publishing).

on:
  push:
    branches: [master]
    paths:
      - libraries/sdk/pyproject.toml
      - libraries/tools/pyproject.toml
      - libraries/runtime/pyproject.toml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-pypi
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # The GitHub environment referenced by the trusted-publisher config; add
    # required reviewers to it for a manual approval gate before uploads.
    environment: pypi
    permissions:
      contents: read
      id-token: write # OIDC token exchange for trusted publishing
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: "0.11.2"

      # mascope-sdk goes first: mascope-tools depends on it, so when a single
      # commit bumps both, the SDK release must exist before the tools wheel
      # is resolved and tested.
      - name: Publish mascope-sdk (if the version is new)
        run: bash .github/scripts/publish-package.sh libraries/sdk mascope-sdk mascope_sdk

      - name: Publish mascope-tools (if the version is new)
        run: bash .github/scripts/publish-package.sh libraries/tools mascope-tools mascope_tools

      # Groundwork for the standalone mascope-cli (it depends on this
      # package); nothing else on PyPI consumes it yet.
      - name: Publish mascope-runtime (if the version is new)
        run: bash .github/scripts/publish-package.sh libraries/runtime mascope-runtime mascope_runtime
