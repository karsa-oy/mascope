name: Mascope Tests
run-name: Running tests for PR to develop or master

on:
  pull_request:
    branches: [develop, master]
    types: [opened, synchronize, reopened]

# Least privilege: this workflow only checks out code and runs tests.
permissions:
  contents: read

# A new push to the same PR supersedes the running jobs; cancel them.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint and format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: "0.11.2"

      - name: Check the lockfile is in sync with pyproject.toml
        run: uv lock --check

      - name: Install the lint group
        run: uv sync --only-group lint --no-install-project

      - name: Ruff lint
        run: uv run --no-sync ruff check .

      - name: Ruff format
        run: uv run --no-sync ruff format --check .

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: server/frontend
        run: npm ci

      - name: ESLint
        working-directory: server/frontend
        run: npm run lint:check

  frontend-unit:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server/frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  libraries:
    name: Library tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: "0.11.2"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run library tests
        # Thermo tests that need the proprietary RawFileReader DLLs skip
        # themselves when MASCOPE_THERMO_DLL_DIR is unset.
        env:
          # The library runtimes resolve their config relative to this path
          # at import time; collection fails without it.
          MASCOPE_PATH: ${{ github.workspace }}
        run: uv run pytest libraries/ -v

  cli:
    name: CLI tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: "0.11.2"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run CLI tests
        # Hermetic: the suite's conftest builds its own MASCOPE_PATH home,
        # so no environment setup is needed here.
        run: uv run pytest tooling/cli/tests/ -v

  cli-package:
    name: CLI packaging smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: "0.11.2"

      - name: Build the CLI and runtime wheels
        run: |
          uv build --package mascope_cli --out-dir dist
          uv build --package mascope_runtime --out-dir dist

      - name: Install the wheel in isolation and exercise the operator surface
        run: |
          # Fresh HOME so the default runtime home lands in a throwaway dir,
          # and no MASCOPE_PATH: this is the pip-install experience. The
          # console script must exist, and the smoke asserts the operator
          # command set, the absence of dev commands/deps, and init -> use.
          export HOME=$(mktemp -d)
          uv run --isolated --no-project \
            --with dist/mascope_cli-*.whl --find-links dist \
            mascope --help > /dev/null
          uv run --isolated --no-project \
            --with dist/mascope_cli-*.whl --find-links dist \
            python .github/scripts/wheel_smoke.py

  e2e:
    name: End-to-end tests (demo stack)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: "0.11.2"

      - name: Build application images from this PR
        run: |
          # Build via the CLI exactly like the release pipeline: it resolves
          # the full compose env, including the MASCOPE_RUNTIME build arg the
          # frontend bakes in at build time (the app cannot boot without it).
          export MASCOPE_PATH=$GITHUB_WORKSPACE
          uv run mascope prod build

      - name: Start the demo stack
        run: |
          # The CLI tagged the images with the branch-derived version; point
          # the demo compose at that tag. If the build silently produced
          # nothing, compose fails to pull this unpublished tag from GHCR,
          # which is the failure we want.
          VERSION=$(docker images "ghcr.io/${{ github.repository }}/backend" --format '{{.Tag}}' | head -1)
          echo "Built image tag: $VERSION"
          MASCOPE_VERSION=$VERSION docker compose -f docker-compose.demo.yaml up -d

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/frontend/package-lock.json

      - name: Install dependencies and browsers
        working-directory: server/frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Wait for the stack to come up
        run: |
          # demo_init downloads and restores the demo bundle on first start,
          # so allow generous time before the frontend answers.
          for i in $(seq 1 120); do
            if curl -fsS -o /dev/null http://127.0.0.1:8080; then
              echo "Stack is up."
              exit 0
            fi
            sleep 10
          done
          echo "Stack did not come up in time." >&2
          docker compose -f docker-compose.demo.yaml logs --tail 100
          exit 1

      - name: Stage a raw file for the upload spec
        run: |
          # The upload e2e re-ingests a real demo raw file. The bundle was
          # already fetched by demo_init into its cache volume; copy one raw
          # file out instead of downloading the bundle a second time.
          docker cp mascope_demo_init:/app/.runtime/demo /tmp/demo-bundle
          RAW=$(find /tmp/demo-bundle -path "*/raw/*.raw" | head -1)
          if [ -z "$RAW" ]; then
            echo "No raw file found in the demo bundle cache." >&2
            exit 1
          fi
          echo "Staged raw file: $RAW"
          echo "MASCOPE_E2E_RAW_FILE=$RAW" >> $GITHUB_ENV

      - name: Run e2e tests
        working-directory: server/frontend
        env:
          CI: "true"
        run: npm run test:e2e

      - name: Run SDK contract tests
        env:
          MASCOPE_SDK_CONTRACT: "1"
          MASCOPE_PATH: ${{ github.workspace }}
        run: |
          # Reuses the demo stack this job already booted. These exercise
          # MascopeClient over HTTP, so they catch API-surface breaking
          # changes that unit tests cannot. The image-build step earlier in
          # this job already created .venv, so sync into it (no `uv venv`,
          # which refuses to overwrite an existing environment).
          uv sync --group dev
          uv run pytest libraries/sdk/tests/ -v

      - name: Dump stack logs on failure
        if: failure()
        run: docker compose -f docker-compose.demo.yaml logs --tail 200

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: |
            server/frontend/playwright-report/
            server/frontend/test-results/
          retention-days: 7

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: true

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mascope_user
          # Hardcoded test-only value — matches POSTGRES_TEST_PASSWORD in the test step.
          # Not a production credential; this container is ephemeral to the CI job.
          POSTGRES_PASSWORD: test_postgres_password_for_testing_only
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Don't leave the GITHUB_TOKEN in git config; nothing after checkout needs it.
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: "0.11.2"

      - name: Set up environment
        run: |
          # Set MASCOPE_PATH
          echo "MASCOPE_PATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV

          # Set up test secrets for authentication
          echo "JWT_SECRET_KEY_FILE=test_jwt_secret.txt" >> $GITHUB_ENV
          echo "test_secret_key_for_testing_only" > test_jwt_secret.txt

          echo "SERVER_OWNER_SECRET_KEY_FILE=test_server_owner_secret.txt" >> $GITHUB_ENV
          echo "test_server_owner_secret_key_for_testing_only" > test_server_owner_secret.txt

          # Still required: runtime reads this on init.
          # The actual test DB password is POSTGRES_TEST_PASSWORD in the test step below.
          echo "POSTGRES_PASSWORD_FILE=test_postgres_password.txt" >> $GITHUB_ENV
          echo "test_postgres_password_for_testing_only" > test_postgres_password.txt

      - name: Create virtual environment and install dependencies
        run: |
          # Create a virtual environment
          uv venv
          # Install the package itself in development mode
          uv pip install -e .

          # Install the dev group using uv sync
          uv sync --group dev

      - name: Run tests
        env:
          SKIP_CALIBRATION_FITTING_TEST: 1
          # Test database connection — matches the postgres service container above.
          # TEST_DB_HOST/PORT/USER mirror DatabaseConfig defaults (localhost:5432/mascope_user).
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_USER: mascope_user
          POSTGRES_TEST_PASSWORD: test_postgres_password_for_testing_only
        run: |
          uv run pytest server/backend/tests/ -v
