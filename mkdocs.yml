site_name: Mascope
site_description: High-resolution mass spectrometry data analysis platform
docs_dir: docs/user
site_dir: site

# Snippet files shared between the docs pages and the in-app help popovers
# (rendered to help-content.json). They are include fragments, not pages.
exclude_docs: |
  _help/

# Activate locally with:
#   uv add --group docs mkdocs-material
#   uv run mkdocs serve        # live preview at http://localhost:8000
#   uv run mkdocs build --strict

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  # Lets a page pull in a shared snippet with `--8<-- "_help/<name>.md"`; the
  # same snippets feed the in-app help popovers (see tooling/docs/build_help_content.py).
  - pymdownx.snippets:
      base_path:
        - docs/user

nav:
  - Home: index.md
  - Getting started: getting-started/index.md
  - Concepts: concepts/index.md
  - How it works:
      - Overview: how-it-works/index.md
      - Instrument functions: how-it-works/instrument_functions.md
      - Peak detection: how-it-works/peak_detection.md
      - Calibration: how-it-works/calibration.md
      - Matching: how-it-works/matching.md
  - Guides: guides/index.md
  - Instruments & acquisition: instruments/index.md
  - SDK & API: sdk/index.md
  - Reference: reference/index.md
