services:
  redis:
    image: redis:7-alpine
    container_name: ${MASCOPE_REDIS_CONTAINER_NAME:-mascope_prod_redis}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  postgres:
    image: postgres:16-alpine
    container_name: ${MASCOPE_DB_CONTAINER_NAME:-mascope_prod_postgres}
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=${MASCOPE_DB_SHARED_BUFFERS:-512MB}"
      - "-c"
      - "effective_cache_size=${MASCOPE_DB_EFFECTIVE_CACHE_SIZE:-4GB}"
      - "-c"
      - "work_mem=${MASCOPE_DB_WORK_MEM:-32MB}"
      - "-c"
      - "maintenance_work_mem=${MASCOPE_DB_MAINTENANCE_WORK_MEM:-512MB}"
      - "-c"
      - "autovacuum_work_mem=${MASCOPE_DB_AUTOVACUUM_WORK_MEM:--1}"
      - "-c"
      - "wal_buffers=${MASCOPE_DB_WAL_BUFFERS:-16MB}"
      - "-c"
      - "min_wal_size=${MASCOPE_DB_MIN_WAL_SIZE:-512MB}"
      - "-c"
      - "max_wal_size=${MASCOPE_DB_MAX_WAL_SIZE:-2GB}"
      - "-c"
      - "checkpoint_completion_target=${MASCOPE_DB_CHECKPOINT_COMPLETION_TARGET:-0.9}"
      - "-c"
      - "wal_compression=${MASCOPE_DB_WAL_COMPRESSION:-on}"
      - "-c"
      - "effective_io_concurrency=${MASCOPE_DB_EFFECTIVE_IO_CONCURRENCY:-200}"
      - "-c"
      - "random_page_cost=${MASCOPE_DB_RANDOM_PAGE_COST:-1.1}"
      - "-c"
      - "default_statistics_target=${MASCOPE_DB_DEFAULT_STATISTICS_TARGET:-100}"
      - "-c"
      - "jit=${MASCOPE_DB_JIT:-off}"
      - "-c"
      - "autovacuum_max_workers=${MASCOPE_DB_AUTOVACUUM_MAX_WORKERS:-3}"
    environment:
      POSTGRES_USER: ${MASCOPE_DB_USER:-mascope_user}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    # ports:
    #   - "${MASCOPE_DB_PORT:-5432}:5432" # Exposed for DBeaver, psql, etc.
    shm_size: ${MASCOPE_DB_SHM_SIZE:-20g}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h localhost -U ${POSTGRES_USER:-mascope_user} -d postgres",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ${MASCOPE_PATH}/.runtime/database/prod:/var/lib/postgresql/data
      - ${MASCOPE_PATH}/.runtime/database/backups/prod:/backups
      - ${MASCOPE_PATH}/.runtime/database/transfer:/transfer
    secrets:
      - postgres_password

  db_init:
    image: ghcr.io/karsa-oy/mascope/backend:latest
    container_name: mascope_prod_db_init
    build:
      dockerfile: server/backend/Dockerfile
      context: .
    entrypoint: []
    command: ["/bin/bash", "/app/tooling/db-init.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MASCOPE_ENV: ${MASCOPE_ENV}
      MASCOPE_DB_NAME: ${MASCOPE_DB_NAME:-mascope}
      MASCOPE_DB_USER: ${MASCOPE_DB_USER:-mascope_user}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - ./.runtime/env/${MASCOPE_ENV:-default}:/app/.runtime/env/${MASCOPE_ENV:-default}
      - ${MASCOPE_PATH}/.runtime/database/backups/prod:/backups # for pre-migration dumps
    secrets:
      - postgres_password
    restart: "no" # Run once and exit

  backend: &backend
    command: "api-server"
    image: ghcr.io/karsa-oy/mascope/backend:latest
    container_name: ${MASCOPE_BACKEND_CONTAINER_NAME:-mascope_prod_backend}
    build:
      dockerfile: server/backend/Dockerfile
      context: .
    depends_on:
      db_init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import socket; s=socket.socket(); s.settimeout(2); s.connect((''localhost'', 8090)); s.close()" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    tty: true
    ports:
      - 8090:8090
    volumes:
      # Mount runtime env directory (contains config overrides)
      - ./.runtime/env/${MASCOPE_ENV:-default}:/app/.runtime/env/${MASCOPE_ENV:-default}

      # Mount filestore (matches resolved path in config)
      - ${MASCOPE_FILESTORE}:/app/.runtime/env/${MASCOPE_ENV:-default}/filestore
    environment:
      MASCOPE_ENV: ${MASCOPE_ENV}
      MASCOPE_LOGLEVEL: ${MASCOPE_LOGLEVEL}
      MASCOPE_TIMEZONE: ${MASCOPE_TIMEZONE}
      MASCOPE_DB_NAME: ${MASCOPE_DB_NAME:-mascope}
      MASCOPE_DB_USER: ${MASCOPE_DB_USER:-mascope_user}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      JWT_SECRET_KEY_FILE: /run/secrets/jwt_secret_key
      SERVER_OWNER_SECRET_KEY_FILE: /run/secrets/server_owner_secret_key
    secrets:
      - jwt_secret_key
      - postgres_password
      - server_owner_secret_key
  file_converter:
    <<: *backend
    container_name: ${MASCOPE_FILE_CONVERTER_CONTAINER_NAME:-mascope_prod_file_converter}
    command: "file-converter"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck: {} # Disable inherited from backend healthcheck
    ports: []
  frontend:
    image: ghcr.io/karsa-oy/mascope/frontend:latest
    container_name: ${MASCOPE_FRONTEND_CONTAINER_NAME:-mascope_prod_frontend}
    build:
      context: server/frontend
      args:
        - MASCOPE_RUNTIME
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - MASCOPE_TIMEZONE
    secrets:
      - ssl_certificate
      - ssl_secret_key
    tty: true
    ports:
      - 443:443

volumes:
  redis_data:

secrets:
  jwt_secret_key:
    file: .runtime/secrets/jwt_secret_key.txt
  postgres_password:
    file: .runtime/secrets/postgres_password.txt
  server_owner_secret_key:
    file: .runtime/secrets/server_owner_secret_key.txt
  ssl_certificate:
    file: .runtime/secrets/mascope.app.pem
  ssl_secret_key:
    file: .runtime/secrets/mascope.app.key
