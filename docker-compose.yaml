services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
  backend: &backend
    command: "api-server"
    image: ghcr.io/karsa-oy/mascope/backend:latest
    build:
      dockerfile: server/backend/Dockerfile
      context: .
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import socket; s=socket.socket(); s.settimeout(2); s.connect((''localhost'', 8090)); s.close()" || exit 1',
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 40s
    tty: true
    ports:
      - 8090:8090
    volumes:
      - ./.runtime/env/${MASCOPE_ENV:-default}:/app/.runtime/env/prod
      - ${MASCOPE_FILESTORE}:/app/.runtime/env/prod/filestore
    environment:
      MASCOPE_LOGLEVEL: ${MASCOPE_LOGLEVEL}
      MASCOPE_TIMEZONE: ${MASCOPE_TIMEZONE}
      JWT_SECRET_KEY_FILE: /run/secrets/jwt_secret_key
      SERVER_OWNER_SECRET_KEY_FILE: /run/secrets/server_owner_secret_key
    secrets:
      - jwt_secret_key
      - server_owner_secret_key
  file_converter:
    <<: *backend
    command: "file-converter"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck: {} # Disable inherited from backend healthcheck
    ports: []
  frontend:
    image: ghcr.io/karsa-oy/mascope/frontend:latest
    build:
      context: server/frontend
      args:
        - MASCOPE_RUNTIME
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - MASCOPE_TIMEZONE
    secrets:
      - ssl_certificate
      - ssl_secret_key
    tty: true
    ports:
      - 443:443

volumes:
  redis_data:

secrets:
  jwt_secret_key:
    file: .runtime/secrets/jwt_secret_key.txt
  server_owner_secret_key:
    file: .runtime/secrets/server_owner_secret_key.txt
  ssl_certificate:
    file: .runtime/secrets/mascope.app.pem
  ssl_secret_key:
    file: .runtime/secrets/mascope.app.key
