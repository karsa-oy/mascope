services:
  backend:
    command: "api-server"
    build:
      dockerfile: backend/Dockerfile
      context: .
    tty: true
    ports:
      - 8090:8090
    volumes:
      - ./runtime/env/${MASCOPE_ENV:-default}:/app/runtime/env/prod
      - ${MASCOPE_FILESTORE}:/app/runtime/env/prod/filestore
    environment:
      MASCOPE_LOGLEVEL: ${MASCOPE_LOGLEVEL}
      MASCOPE_TIMEZONE: ${MASCOPE_TIMEZONE}
      JWT_SECRET_KEY_FILE: /run/secrets/jwt_secret_key
    secrets:
      - jwt_secret_key
  file_converter:
    command: "file-converter"
    build:
      dockerfile: backend/Dockerfile
      context: .
    tty: true
    volumes:
      - ./runtime/env/${MASCOPE_ENV:-default}:/app/runtime/env/prod
      - ${MASCOPE_FILESTORE}:/app/runtime/env/prod/filestore
    environment:
      - MASCOPE_LOGLEVEL
      - MASCOPE_TIMEZONE
  frontend:
    build:
      context: frontend
      args:
        - MASCOPE_RUNTIME
    environment:
      - MASCOPE_TIMEZONE
    tty: true
    ports:
      - 443:443

secrets:
  jwt_secret_key:
    file: secrets/jwt_secret_key.txt
