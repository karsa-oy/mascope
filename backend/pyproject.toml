[tool.poetry]
name = "mascope_server"
version = "1.2"
description = "Karsa Mascope"
authors = ["Karsa Oy <support@karsa.fi>"]
license = "Proprietary"
packages = [{ include = "mascope_server" }]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.scripts]
mascope-api = 'mascope_server.main:run'
file-converter = 'mascope_server.service.file_converter:run'
log-rotate = 'mascope_server.service.log_rotate:run'
db-restore = 'mascope_server.db.ops.restore:run_db_restore'
db-maintenance = 'mascope_server.db.ops.maintenance:run_db_maintenance'

[tool.poetry.dependencies]
python = "~3.10"
mascope_lib = { path = '../libraries/mascope_lib', develop = true }
mascope_hardware = { path = '../libraries/mascope_hardware', develop = true }

aiohttp = "^3.8.6"
aiohttp_cors = "^0.7.0"
aiosqlite = "^0.19.0"
asgiref = "^3.6.0"
asynctest = "^0.13.0"
Bottleneck = "^1.3.5"
colorcet = "^3.0.0"
dask = "^2023.10.0"
datashader = "^0.15.2"
datetime_glob = "^1.0.8"
decorator = "^5.1.1"
fastapi = "^0.95.1"
h5py = "^3.10.0"
h5sparse = "^0.1.0"
lmfit = "^1.2.2"
nanoid = "^2.0.0"
nest-asyncio = "^1.5.5"
numpy = "^1.26.1"
openpyxl = "^3.0.10"
pandas = "^2.1.1"
Pillow = "^9.1.1"
pyarrow = "^11.0.0"
python-dotenv = "^1.0.0"
pythonnet = "^3.0.3"
pyaml = "^23.9.7"
PyYAML = "^6.0"
python-socketio = "^5.10.0"
requests = "^2.28.1"
scikit_learn = "^1.1.1"
scipy = "^1.11.3"
setuptools = "^62.6.0"
sparse = "^0.14.0"
sqlalchemy = "^2.0.12"
uvicorn = "^0.19.0"
watchdog = "^3.0.0"
websocket-client = "^1.4.0"
websockets = "^10.3"
xarray = "^2023.10.1"
zarr = "^2.16.1"

[tool.poetry.group.dev.dependencies]
austin-dist = "^3.6.0"
deptry = "^0.16.1"
pytest = "^8.2.0"
pytest-asyncio = "^0.23.7"
