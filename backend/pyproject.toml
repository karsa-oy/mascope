[tool.poetry]
name = "backend"
version = "1.0"
description = "User-friendly chemical detection platform"
authors = ["Karsa Oy <support@karsa.fi>"]
license = "Proprietary"
include = ["backend"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.scripts]
server = 'backend:run'
router = 'backend.router:run'
file-streaming-service = 'backend.service.file_streaming:run'
file-io-service = 'backend.service.file_io:run'

[tool.poetry.dependencies]
python = ">=3.8,<3.11"
# server and api
uvicorn = "^0.18.2"
websockets = "^10.3"
python-socketio = "5.6.0"
# router
aiohttp = "3.8.1"
aiohttp_cors = "0.7.0"
# database
duckdb = "^0.4.0"
# data science
datashader = "0.14.1"
numpy = "1.23.0"
pandas = "1.4.3"
scikit_learn = "1.1.1"
scipy = "1.8.1"
# other
asynctest = "0.13.0"
colorcet = "3.0.0"
dask = "2022.6.1"
datetime_glob = "1.0.8"
decorator = "5.1.1"
h5py = "3.7.0"
h5sparse = "0.1.0"
lmfit = "1.0.3"
nanoid = "2.0.0"
Pillow = "9.1.1"
pythonnet = "2.5.2"
PyYAML = "6.0"
setuptools = "62.6.0"
sparse = "0.13.0"
watchdog = "2.1.9"
xarray = "2022.3.0"
zarr = "2.12.0"
nest-asyncio = "^1.5.5"
Bottleneck = "^1.3.5"
python-dotenv = "^0.20.0"
