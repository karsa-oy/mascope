
# MASCOPE BASE CONFIGURATION
# Shared defaults for all modes 

# Each section may also have
# log_level =  "trace", "debug", "info", "warning", "success", "error" or "critical"

[meta]
description = "The default runtime env"
api_port = 8090
filestore = './filestore'

[cli]
color = "blue"
log_path = './logs'

# SERVERS

[backend]
tags = ['server', 'tof', 'orbi', 'file', 'lab', 'all']
log_path = './logs'
color = "green"
# paths
filestreams = './filestreams'
# scripts
run = "uv run mascope-backend run api-server"

[backend.database]
type = "sqlite"   # "sqlite" or "postgres"

# Storage
data_dir = "./database"  # Base path for all DB files (SQLite only: env./database/mascope.v43.db)

# PostgreSQL connection (used when type="postgres")
database = "mascope"
user = "mascope_user"
port = 5432

# Connection settings
connection_timeout = 30

# SQLAlchemy pool settings (per worker)
pool_size = 3
max_overflow = 2
pool_timeout = 30
pool_pre_ping = true
expire_on_commit = false

[backend.redis] 
port = 6379
image = "redis:7-alpine"

[file-converter]
tags = ['server', 'tof', 'orbi', 'file', 'all']
log_path = './logs'
color = "orange"
# settings
source = './filestreams'
raw_threads = 1
h5_threads = 1
# scripts
run = "uv run mascope-backend run file-converter"


[frontend]
tags = ['lab', 'orbi', 'tof', 'file', 'all']
log_path = './logs'
color = "magenta"
# settings
# acquisition_filter = { min = '2020-01-01T00:00' }
sample_table_defaults = { columns = ["sample_item_name", "index"], sort_field = "index", sort_order = -1 }
# scripts
run = "cd ./server/frontend && npm install && npm run dev"

# AGENTS

[tof-agent]
tags = ['agents', 'tof', 'all']
log_path = './logs'
color = "pink"
# settings
host = 'localhost'
access_token = ''
# scripts
run = "uv run mascope agent tof"

[file-agent]
tags = ['agents', 'orbi', 'all']
log_path = './logs'
color = "purple"
# settings
mask = '*.raw'
timeout = 10
source = './agents/file'
host = 'localhost'
access_token = ''
# scripts
run = "uv run mascope agent file"

# LIBRARIES

# general

[file-lib]
tags = ['lib']
log_path = './logs'
color = "white"

[chemistry-lib]
tags = ['lib']
log_path = './logs'
color = "white"

[signal-lib]
tags = ['lib']
log_path = './logs'
color = "white"

[match-lib]
tags = ['lib']
log_path = './logs'
color = "white"

# hardware

[thermo-lib]
tags = ['lib']
log_path = './logs'
color = "white"

[tofwerk-lib]
tags = ['lib']
log_path = './logs'
color = "white"
# settings
tofwerk_dll = 'Auto'
# 'Auto', 'Windows', 'Linux' or 'Darwin' (= MacOs)

# public

[sdk-lib]
tags = ['lib']
log_path = './logs'
color = "white"
