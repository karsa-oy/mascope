version: "3.9"
services:
  backend:
    build:
      context: ./backend
      dockerfile: ./docker/Dockerfile
    volumes:
      - ./testdata:/data
      - ./backend:/backend
    stdin_open: true  
    tty: true
    network_mode: "host"
    env_file: .env.development
  frontend:
    build:
      context: ./frontend
    volumes:
      - ./testdata:/data
      - ./frontend/src:/frontend/src
    network_mode: "host"
    env_file: .env.development