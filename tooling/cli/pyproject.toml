[project]
name = "mascope_cli"
version = "0.0.0"
description = "Karsa Mascope"
authors = [{ name = "Karsa Oy", email = "support@karsa.fi" }]
requires-python = ">=3.12,<3.13"
license.text = "LicenseRef-Proprietary"
dependencies = [
    "mascope_runtime",
    "typer>=0.12.3,<0.13",
    "rich>=13.7.1,<14",
]

[build-system]
requires = ["uv_build>=0.6,<0.7"]
build-backend = "uv_build"
