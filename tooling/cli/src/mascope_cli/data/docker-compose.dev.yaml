# Development environment dependencies
# Services: PostgreSQL, Redis
# Application services (backend, frontend, etc.) run locally
#
# Usage:
#   mascope dev up             # Start dependencies only
#   mascope dev down           # Stop dependencies
#   mascope dev run            # Start everything (deps + auto migrations + app)
#   mascope dev logs postgres  # View logs from development containers.

name: mascope_dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${MASCOPE_DB_CONTAINER_NAME:-mascope_dev_postgres}
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=${MASCOPE_DB_SHARED_BUFFERS:-512MB}"
      - "-c"
      - "effective_cache_size=${MASCOPE_DB_EFFECTIVE_CACHE_SIZE:-4GB}"
      - "-c"
      - "work_mem=${MASCOPE_DB_WORK_MEM:-32MB}"
      - "-c"
      - "maintenance_work_mem=${MASCOPE_DB_MAINTENANCE_WORK_MEM:-512MB}"
      - "-c"
      - "autovacuum_work_mem=${MASCOPE_DB_AUTOVACUUM_WORK_MEM:--1}"
      - "-c"
      - "wal_buffers=${MASCOPE_DB_WAL_BUFFERS:-16MB}"
      - "-c"
      - "min_wal_size=${MASCOPE_DB_MIN_WAL_SIZE:-512MB}"
      - "-c"
      - "max_wal_size=${MASCOPE_DB_MAX_WAL_SIZE:-2GB}"
      - "-c"
      - "checkpoint_completion_target=${MASCOPE_DB_CHECKPOINT_COMPLETION_TARGET:-0.9}"
      - "-c"
      - "wal_compression=${MASCOPE_DB_WAL_COMPRESSION:-on}"
      - "-c"
      - "effective_io_concurrency=${MASCOPE_DB_EFFECTIVE_IO_CONCURRENCY:-200}"
      - "-c"
      - "random_page_cost=${MASCOPE_DB_RANDOM_PAGE_COST:-1.1}"
      - "-c"
      - "default_statistics_target=${MASCOPE_DB_DEFAULT_STATISTICS_TARGET:-100}"
      - "-c"
      - "jit=${MASCOPE_DB_JIT:-off}"
      - "-c"
      - "autovacuum_max_workers=${MASCOPE_DB_AUTOVACUUM_MAX_WORKERS:-3}"
    environment:
      POSTGRES_USER: ${MASCOPE_DB_USER:-mascope_user}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    ports:
      - "${MASCOPE_DB_PORT:-5432}:5432" # Exposed for DBeaver, psql, etc.
    shm_size: ${MASCOPE_DB_SHM_SIZE:-1g}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mascope_user}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ${MASCOPE_PATH}/.runtime/database/dev:/var/lib/postgresql/data
      - ${MASCOPE_PATH}/.runtime/database/backups/dev:/backups
      - ${MASCOPE_PATH}/.runtime/database/transfer:/transfer
    secrets:
      - postgres_password

  redis:
    image: redis:7-alpine
    container_name: ${MASCOPE_REDIS_CONTAINER_NAME:-mascope_dev_redis}
    ports:
      - "${MASCOPE_REDIS_PORT:-6379}:6379" # Exposed for redis-cli access
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_dev_data:/data
    restart: unless-stopped

volumes:
  redis_dev_data: # Docker manages this volume

secrets:
  postgres_password:
    file: ${MASCOPE_PATH}/.runtime/secrets/postgres_password.txt
