
# MASCOPE PRODUCTION MODE CONFIGURATION
# Overrides base.mascope.toml for prod mode

# Each section may also have
# log_level =  "trace", "debug", "info", "warning", "success", "error" or "critical"

[backend]
workers = "auto" # uvicorn workers ("auto" || int)

[backend.database]
type = "sqlite"   # "sqlite" or "postgres"

# Connection
host = "postgres"  # Docker Compose service name

# Engine settings for multi-worker production
# With auto workers (12 usually): pool_size=3, max_overflow=2 → 12 × 5 = 60 max connections
# Stays under PostgreSQL max_connections=100 default
pool_size = 3
max_overflow = 2

[backend.redis]
host = "redis"  # Docker Compose service name

[file-converter]
server = "backend"  # Connect to prod backend (Docker Compose service name)